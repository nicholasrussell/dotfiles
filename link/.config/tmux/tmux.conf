# remap prefix from C-b to C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# mouse mode
set-option -g mouse on
# keyboard must be used to copy mouse selection
# unbind -Tcopy-mode MouseDragEnd1Pane

# bells
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-option -gw monitor-activity off
set-option -g bell-action none

# focus events
set-option -gs focus-events on

# escape time
set-option -g escape-time 0

# don't rename windows automatically
set-option -g allow-rename off

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# next / previous window bindings
bind-key C-p previous-window
bind-key C-n next-window

# window numbers
set-option -g base-index 1
set-option -g renumber-windows on
set-option -g pane-base-index 1

# status bar
set-option -g status-position top
set-option -g status-justify absolute-centre
set-option -g status-style fg=black,bg=brightwhite
set-option -g status-left "[#S] "
set-option -g status-right ""
set-option -g window-status-format "#I:#W#{?window_flags,#{window_flags}, }"
set-option -g window-status-current-style "fg=black bold,bg=#ffffff"

# messages
set-option -g message-style 'fg=black bg=yellow'

# reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

